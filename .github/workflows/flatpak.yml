name: Build Flatpak (Linux Desktop)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  flatpak:
    if: ${{ vars.CI_PROFILE != 'lite' }}
    runs-on: ubuntu-22.04
    container:
      image: bilelmoussaoui/flatpak-github-actions:gnome-48
      options: --privileged
    env:
      MAVEN_USER: ${{ secrets.MAVEN_USER }}
      MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
      MAVEN_PUBLIC_URL: ${{ secrets.MAVEN_PUBLIC_URL }}
      DISABLE_ADDITIONAL_FEATURES: 'true'
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build Flatpak bundle
        uses: flatpak/flatpak-github-actions/flatpak-builder@10a3c29f0162516f0f68006be14c92f34bd4fa6c # v6.5
        with:
          bundle: stirling-pdf.flatpak
          manifest-path: packaging/flatpak/com.stirlingpdf.StirlingPDF.yml
          cache-key: flatpak-builder-${{ github.sha }}
          # MVP: network allowed during build; offline/Flathub mode is a follow-up.
          arch: x86_64

      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: stirling-pdf-flatpak-x86_64
          path: stirling-pdf.flatpak
          retention-days: 14
